# wwebjs-api configuration overrides.
#
# The base wwebjs-api service is defined in the root docker-compose.yml so that a
# plain `docker compose up` works. Use THIS file to layer extra configuration
# without editing the base, e.g.:
#
#   docker compose -f docker-compose.yml -f whatsapp-gateway/docker-compose.override.yml up
#
# We never rewrite wwebjs-api (PROMPT §13) — we only configure it via env.

services:
  wwebjs-api:
    environment:
      # Pre-create a single session so we can start/scan it deterministically.
      ENABLE_LOCAL_CALLBACK_EXAMPLE: "false"
      # Tracking delivery acks is optional; enable message_ack if you want it by
      # removing it from DISABLED_CALLBACKS in the base compose.
      MAX_ATTACHMENT_SIZE: "10000000"
      SET_MESSAGES_AS_SEEN: "true"
    volumes:
      # Persist WhatsApp auth across restarts so you don't re-scan the QR.
      - ./whatsapp-gateway/sessions:/usr/src/app/sessions
